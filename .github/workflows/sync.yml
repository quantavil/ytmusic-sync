name: Sync Spotify Charts to YouTube Music

on:
  schedule:
    # Run daily at 03:50 UTC
    - cron: '50 3 * * *'
  workflow_dispatch: # Allows manual trigger

concurrency:
  group: ytmusic-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt --system

      - name: Cache resolved track data
        uses: actions/cache@v4
        with:
          path: data
          key: ytmusic-sync-data-${{ github.run_id }}
          restore-keys: |
            ytmusic-sync-data-

      - name: Restore Google OAuth Token
        run: |
          echo '${{ secrets.YT_OAUTH_TOKEN_JSON }}' > token.json

      - name: Run Sync (Global)
        run: |
          python sync.py --country global

      - name: Run Sync (India)
        run: |
          python sync.py --country in
