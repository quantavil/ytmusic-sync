name: Sync Spotify Charts to YouTube Music

on:
  schedule:
    # Run daily at 03:50 UTC
    - cron: '50 3 * * *'
  workflow_dispatch: # Allows manual trigger

concurrency:
  group: ytmusic-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt --system

      - name: Restore Browser Credentials
        run: |
          echo '${{ secrets.YT_MUSIC_BROWSER_JSON }}' > browser.json

      - name: Run Sync (Global)
        run: |
          python sync.py --country global

      - name: Run Sync (India)
        run: |
          python sync.py --country in
